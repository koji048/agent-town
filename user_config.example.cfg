; Copy this file to user_config.cfg and fill in your key.
; user_config.cfg is gitignored — your key never leaves your machine.
; Alternatively set the ANTHROPIC_API_KEY environment variable.

[claude]
; auto = prefer the Claude Code CLI (your login), then API key, then demo.
; Options: auto | claude-code | api | simulate
provider="auto"
api_key=""
model="claude-sonnet-5"
max_tokens=3000

[town]
; Seconds between queue polls
poll_interval=4.0
; If true (or if no API key is found), agents produce canned demo output
; instead of calling the API. Great for trying the town with zero setup.
simulate=false

[content]
language="Thai primary, with English hooks and hashtags"
niche="Education / how-to short videos (Reels, TikTok, Shorts)"
